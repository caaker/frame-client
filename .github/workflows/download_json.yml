name: download_json

# run daily or manually
on:
  schedule:
    - cron: '11 1 * * *'
  workflow_dispatch:

# permission to write to the repository and manage actions
permissions:
  contents: write
  actions: write

jobs:
  # cancel the job if it takes more than 1 minute
  run-script:
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      # clones repository into the github action runner
      - name: Checkout Repository
        uses: actions/checkout@v6

      # installs node.js 24 (Active LTS as of March 2026)
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      # create a directory if it does not exist and run the daily script
      - name: Run Fetch Script
        run: |
          mkdir -p _dist
          node download_json.js

      # commits and pushes from the runner to the current repository
      - name: Commit and Push cache.txt
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          # [skip ci] ensures the commit does not trigger another workflow
          commit_message: 'chore: auto-update article cache [skip ci]'
          file_pattern: '_dist/*'
      
      # triggers a webpack build
      - name: Trigger Build Workflow
        run: gh workflow run webpack.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
