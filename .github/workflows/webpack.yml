name: webpack

# run this file on a push to main or manually
# this file has the net effect of running webpack for frame-client

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# a new run will cancel the previous run, this avoids collisions
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      #clones into the github actions runner
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      # installs node into runner
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      # installs packages via package-lock.json
      - name: Install dependencies
        run: npm ci

      # runs build script defined in package.json
      - name: Run Webpack build
        run: npm run build-dev

# new method
# github knows where you repo/branch is for pages, a token is not required
# we need to update permissions in this file and the deployment method in the GUI
      
      # the packer
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _dist
      
      # the mover
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4




