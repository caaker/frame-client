name: webpack

# run this file on a push to main or manually
# this file has the net effect of running webpack for frame-client and pushing the result to github pages
# it is very efficient, if bundle.js does not change there is no change at the destination repository

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# a new run will cancel the previous run, this avoids collisions
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      #clones into the github actions runner
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      # installs node into runner
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      # installs packages via package-lock.json
      - name: Install dependencies
        run: npm ci

      # runs build script defined in package.json
      - name: Run Webpack build
        run: npm run webpack-dev

# method 3
      - name: Deploy to Remote Repo
        uses: peaceiris/actions-gh-pages@v4
        with:
          # created and named in the GUI
          personal_token: ${{ secrets.API_TOKEN_GITHUB }}
          # the source
          publish_dir: ./_dist
          # the destination
          external_repository: caaker/caaker.github.io
          publish_branch: main
    


