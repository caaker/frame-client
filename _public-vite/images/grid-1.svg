<svg width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="minor" width="10" height="10" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="1" height="1" fill="#BBBBBB" />
    </pattern>
    
    <pattern id="major" width="100" height="100" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="2" height="2" fill="#666666" />
    </pattern>
  </defs>

  <rect width="100%" height="100%" fill="url(#minor)" />
  
  <rect width="100%" height="100%" fill="url(#major)" />
</svg>
